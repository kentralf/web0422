<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web0422 介紹</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style-type: disc;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <h1>歡迎來到 Web0422(333)</h1>
    <p>這是一個簡單的網頁範例，用來介紹基本的 HTML 結構和元素222。</p>
    
    <h2>介紹範例</h2>
    <ul>
        <li><strong>標題：</strong> 使用 &lt;h1&gt; 到 &lt;h6&gt; 標籤來創建不同層級的標題。</li>
        <li><strong>段落：</strong> 使用 &lt;p&gt; 標籤來添加文字段落。</li>
        <li><strong>列表：</strong> 使用 &lt;ul&gt; 和 &lt;li&gt; 來創建無序列表。</li>
        <li><strong>鏈接：</strong> 使用 &lt;a&gt; 標籤來添加超鏈接，例如 <a href="https://www.example.com">範例鏈接</a>。</li>
        <li><strong>圖片：</strong> 使用 &lt;img&gt; 標籤來嵌入圖片（這裡是範例）。</li>
    </ul>
    
    <p>這個頁面展示了基本的 HTML 元素。您可以根據需要修改內容。</p>
</body>
